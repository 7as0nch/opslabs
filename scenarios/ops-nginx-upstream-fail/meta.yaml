grading:
  check_script: /opt/opslabs/check.sh
  check_timeout_seconds: 10
  success_output: "OK"

hints:
  - level: 1
    content: "502 = nginx 没连上 upstream。先看 nginx error.log,再看 ss 端口"
  - level: 2
    content: "tail /var/log/nginx/error.log 会指出 connect refused 到了哪个 ip:port;ss -ltnp 看实际有谁在监听"
  - level: 3
    content: "改 /etc/nginx/conf.d/app.conf 的 proxy_pass 端口跟 app 一致(8080),systemctl reload nginx,curl localhost/ 应返 200"

