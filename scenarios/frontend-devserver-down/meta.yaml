# frontend-devserver-down 场景 meta
# 硬编码注册表在 backend/internal/scenario/registry.go,本文件 V0.8 yaml 扫描方案上线后才会被读取
slug: frontend-devserver-down
version: "1.0.0"

title: "本地 dev server 启动失败"
summary: "接手项目跑不起来,排查 Node 版本、依赖、端口、配置"
description_file: "README.md"

category: frontend
difficulty: 2
estimated_minutes: 8

target_personas:
  - frontend-engineer
  - full-stack
  - student
experience_level: junior

tech_stack:
  - nodejs
  - vite
  - react
skills:
  - dependency-management
  - port-conflict
  - config-troubleshooting
commands:
  - node
  - npm
  - lsof
  - ss
  - kill
tags:
  - onboarding
  - real-world
  - common

runtime:
  image: opslabs/frontend-devserver-down:v1
  memory_mb: 1024
  cpus: 0.5
  idle_timeout_minutes: 30
  passed_grace_minutes: 10
  network_mode: internet-allowed
  variants: []

grading:
  check_script: /opt/opslabs/check.sh
  check_timeout_seconds: 10
  success_output: "OK"

hints:
  - level: 1
    content: "npm run dev 的报错信息别忽略,它通常会告诉你缺什么。同时注意端口占用这件事"
  - level: 2
    content: "依次检查:node_modules 是否完整(装好 @vitejs 相关插件了吗)、3000 端口有没有别的进程占着"
  - level: 3
    content: "npm install 把缺的依赖装回来 → lsof -i:3000 找占用进程并 kill → npm run dev & 让 vite 后台跑"

learning_resources: []
prerequisites:
  - hello-world
recommended_next:
  - backend-api-500
  - ops-nginx-upstream-fail

author: official
created_at: "2026-04-24"
updated_at: "2026-04-24"
is_published: true
is_premium: false
