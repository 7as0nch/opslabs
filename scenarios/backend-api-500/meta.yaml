slug: backend-api-500
version: "1.0.0"
title: "API 总是返回 500"
summary: "用户接口一直 500,看日志、查配置、验证数据库连接"
description_file: "README.md"

category: backend
difficulty: 3
estimated_minutes: 12

target_personas:
  - backend-engineer
  - full-stack
experience_level: junior

tech_stack:
  - python
  - flask
  - sqlite
skills:
  - log-analysis
  - config-troubleshooting
  - database-connectivity
  - service-management
commands:
  - journalctl
  - systemctl
  - curl
  - tail
  - cat
  - sed
tags:
  - interview-common
  - real-world
  - 500-error

runtime:
  image: opslabs/backend-api-500:v1
  memory_mb: 768
  cpus: 0.5
  idle_timeout_minutes: 30
  passed_grace_minutes: 10
  network_mode: isolated
  variants: []

grading:
  check_script: /opt/opslabs/check.sh
  check_timeout_seconds: 10
  success_output: "OK"

hints:
  - level: 1
    content: "API 返回 500 但你不知道为啥?先看服务的错误日志,别盲猜"
  - level: 2
    content: "日志会告诉你 password authentication failed,跟 /etc/app/config.yaml 里的 db_password 对应着看"
  - level: 3
    content: "journalctl -u app -n 30 → 见 FATAL password 错。改 /etc/app/config.yaml 把 db_password 改成 opslabs2026 → systemctl restart app → 再 curl"

