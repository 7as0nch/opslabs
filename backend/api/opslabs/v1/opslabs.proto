syntax = "proto3";

package opslabs.v1;

import "google/api/annotations.proto";

option go_package = "github.com/7as0nch/backend/api/opslabs/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.opslabs.v1";
option java_outer_classname = "OpslabsProto";

// =====================================================================
// Scenario 场景元信息服务
// =====================================================================
service Scenario {
  // 场景列表(支持 category / difficulty / persona 过滤,Week 1 查询参数先不生效)
  rpc ListScenarios (ListScenariosRequest) returns (ListScenariosReply) {
    option (google.api.http) = {
      get: "/v1/scenarios"
    };
  }

  // 场景详情(含 Markdown 描述与提示外壳)
  rpc GetScenario (GetScenarioRequest) returns (ScenarioReply) {
    option (google.api.http) = {
      get: "/v1/scenarios/{slug}"
    };
  }
}

// =====================================================================
// Attempt 场景尝试服务
// =====================================================================
service Attempt {
  // 启动场景,分配容器与 ttyd 端口
  rpc StartScenario (StartScenarioRequest) returns (StartScenarioReply) {
    option (google.api.http) = {
      post: "/v1/scenarios/{slug}/start"
      body: "*"
    };
  }

  // 查询 Attempt 状态(前端每 10s 轮询,顺便更新 last_active_at)
  rpc GetAttempt (GetAttemptRequest) returns (AttemptReply) {
    option (google.api.http) = {
      get: "/v1/attempts/{id}"
    };
  }

  // 判题(同步执行容器内 check.sh)
  rpc CheckAttempt (CheckAttemptRequest) returns (CheckAttemptReply) {
    option (google.api.http) = {
      post: "/v1/attempts/{id}/check"
      body: "*"
    };
  }

  // 手动结束场景
  rpc TerminateAttempt (TerminateAttemptRequest) returns (TerminateAttemptReply) {
    option (google.api.http) = {
      post: "/v1/attempts/{id}/terminate"
      body: "*"
    };
  }
}
// 备注:曾计划新增 ExtendAttempt RPC(通关后复盘续期)。
// V1 方案改为前端做客户端倒计时到期再 Terminate,利用后端 PassedGrace 自然清理,
// 避免 proto regen 拖慢链路。未来需要服务端强制续期时再加回 ExtendAttempt。

// =====================================================================
// 公共消息
// =====================================================================

// Hint 提示外壳(Week 1 content 始终返回空,V2 解锁后才带内容)
message Hint {
  uint32 level = 1;
  bool unlocked = 2;
  string content = 3;
}

// ScenarioBrief 场景列表项(精简字段)
message ScenarioBrief {
  string slug = 1;
  string title = 2;
  string summary = 3;
  string category = 4;
  uint32 difficulty = 5;
  uint32 estimated_minutes = 6;
  repeated string target_personas = 7;
  repeated string tech_stack = 8;
  repeated string tags = 9;
  bool is_premium = 10;
  // 执行模式:sandbox / static / wasm-linux / web-container(默认 sandbox)
  string execution_mode = 11;
}

// ScenarioDetail 场景详情(完整字段)
message ScenarioDetail {
  string slug = 1;
  string version = 2;
  string title = 3;
  string summary = 4;
  string description_md = 5;
  string category = 6;
  uint32 difficulty = 7;
  uint32 estimated_minutes = 8;
  repeated string target_personas = 9;
  string experience_level = 10;
  repeated string tech_stack = 11;
  repeated string skills = 12;
  repeated string commands = 13;
  repeated string tags = 14;
  repeated Hint hints = 15;
  bool is_premium = 16;
  // 执行模式:sandbox / static / wasm-linux / web-container(默认 sandbox)
  string execution_mode = 17;
  // bundle 资源入口:static/wasm-linux/web-container 模式下前端 Runner 的入口 URL。
  // sandbox 模式下为空。V1 由后端 embed.FS 下发,值形如 "/v1/scenarios/{slug}/bundle/index.html"
  string bundle_url = 18;
}

// =====================================================================
// Scenario 相关
// =====================================================================

// ListScenariosRequest 场景列表查询(过滤字段 Week 2 再生效)
message ListScenariosRequest {
  string category = 1;
  uint32 difficulty = 2;
  string persona = 3;
  string tech = 4;
  string tag = 5;
}

message ListScenariosReply {
  repeated ScenarioBrief scenarios = 1;
  uint32 total = 2;
}

message GetScenarioRequest {
  string slug = 1;
}

message ScenarioReply {
  ScenarioDetail scenario = 1;
}

// =====================================================================
// Attempt 相关
// =====================================================================

message StartScenarioRequest {
  string slug = 1;
}

message StartScenarioReply {
  string attempt_id = 1;
  string terminal_url = 2;
  // 空闲超时时间(RFC3339)
  string expires_at = 3;
  // 执行模式(冗余下发,前端不必再查场景详情就能选 Runner)
  string execution_mode = 4;
  // bundle 资源入口(非 sandbox 模式必填)
  string bundle_url = 5;
}

message GetAttemptRequest {
  string id = 1;
}

message AttemptReply {
  string attempt_id = 1;
  string scenario_slug = 2;
  string status = 3;
  string terminal_url = 4;
  string started_at = 5;
  string last_active_at = 6;
  string execution_mode = 7;
  string bundle_url = 8;
  // 备注:未加 expires_at / idle_timeout_seconds / passed_grace_seconds —
  //       V1 前端用 StartScenarioReply.expires_at 作为基准,配合 last_active_at
  //       的变化自行外推倒计时。保留字段号 9-11 给未来补齐使用,避免二次改动时冲突。
}

// ClientCheckResult 前端/wasm runner 自带的判题结果
// 非 sandbox 模式下由前端跑完后上报;sandbox 模式忽略此字段(后端 docker exec 跑 check.sh)
message ClientCheckResult {
  bool passed = 1;
  int32 exit_code = 2;
  string stdout = 3;
  string stderr = 4;
}

message CheckAttemptRequest {
  string id = 1;
  // 仅非 sandbox 模式使用:前端 Runner 自己跑完判题后把结果带上来
  ClientCheckResult client_result = 2;
}

message CheckAttemptReply {
  bool passed = 1;
  string message = 2;
  // 仅通关时返回
  uint32 duration_seconds = 3;
  uint32 check_count = 4;
}

message TerminateAttemptRequest {
  string id = 1;
}

message TerminateAttemptReply {
  string status = 1;
}
