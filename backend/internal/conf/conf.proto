syntax = "proto3";
package kratos.api;

option go_package = "backend/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Log log = 3;
  Auth auth = 4;
  Beta beta = 5;
}

message Log {
  string level = 1;
  string format = 2;
  bool showLine = 3;
  string encodeLevel = 4;
  string director = 5;
  int32 maxAge = 6;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message PGDataBase {
    string host = 1;
    int32 port = 2;
    string user = 3;
    string password = 4;
    string dbname = 5;
    string sslmode = 6;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
    string password = 5;
  }

  Database database = 1;
  PGDataBase pg_database = 2;
  Redis redis = 3;
}

message Auth {
  message QQ {
    string app_id = 1;
    string app_key = 2;
    string callback_url = 3;
    string frontend_redirect = 4;
    string scope = 5;
  }

  QQ qq = 1;
}

message Beta {
  message Mail {
    string host = 1;
    int32 port = 2;
    string username = 3;
    string password = 4;
    string to = 5;
    string from = 6;
  }

  Mail mail = 1;
}
