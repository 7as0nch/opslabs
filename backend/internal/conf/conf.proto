syntax = "proto3";
package kratos.api;

option go_package = "backend/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Log log = 3;
  Auth auth = 4;
  Beta beta = 5;
  Runtime runtime = 6;
}

message Log {
  string level = 1;
  string format = 2;
  bool showLine = 3;
  string encodeLevel = 4;
  string director = 5;
  int32 maxAge = 6;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message PGDataBase {
    string host = 1;
    int32 port = 2;
    string user = 3;
    string password = 4;
    string dbname = 5;
    string sslmode = 6;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
    string password = 5;
  }

  Database database = 1;
  PGDataBase pg_database = 2;
  Redis redis = 3;
}

message Auth {
  message QQ {
    string app_id = 1;
    string app_key = 2;
    string callback_url = 3;
    string frontend_redirect = 4;
    string scope = 5;
  }

  QQ qq = 1;
}

message Beta {
  message Mail {
    string host = 1;
    int32 port = 2;
    string username = 3;
    string password = 4;
    string to = 5;
    string from = 6;
  }

  Mail mail = 1;
}

// Runtime 容器运行时与场景编排相关配置
message Runtime {
  // driver: "mock" | "docker"(Week 1 固定为 mock)
  string driver = 1;
  // Docker 端口池 [port_start, port_end]
  int32 port_start = 2;
  int32 port_end = 3;
  // 终端访问 URL 模板,占位符 {host}/{port},例如:
  //   http://{host}:{port}/
  //   https://lab.example.com/t/{port}/
  string terminal_url_template = 4;
  // 终端宿主机(公网地址,填前端访问的外部 host)
  string terminal_host = 5;
  // 默认空闲超时,超时会被 reaper 标记为 expired
  google.protobuf.Duration default_idle_timeout = 6;
  // reaper 扫描周期
  google.protobuf.Duration reaper_interval = 7;
  // Docker 网络名,所有场景容器加入该网络(NetworkMode=internet-allowed 场景除外)
  // 默认 "opslabs-scenarios",docker runtime 生效
  string docker_network = 8;
  // 通关 grace:passed 态容器留给用户复盘的保留时间,到期后 reaper 清容器
  // 默认 10 分钟
  google.protobuf.Duration passed_grace = 9;
}
